syntax = "proto3";

package proto.v1;

option go_package = "proto/v1";

message Preamble {
  repeated string qname = 1;
  uint32 query_type = 2;
  uint32 query_class = 3;
  uint32 ttl = 4;
  uint32 length = 5;
};

message ARecData {
  uint32 ip = 1;
}

message NsRecData {
  repeated string label_sequence = 1;
}

message CnameRecData {
  repeated string label = 1;
}

message DnsData {
  oneof data {
    ARecData a = 1;
    NsRecData ns = 2;
    CnameRecData cname = 3;
  }
}

message UpsertDnsRequest {
  Preamble preamble = 1;

  oneof data {
    ARecData a = 2;
    NsRecData ns = 3;
    CnameRecData cname = 4;
  }
}

message UpsertDnsResponse {
  Preamble preamble = 1;
  string status = 2;

  repeated DnsData records = 3;
}

message FindRecordRequest {
  Preamble preamble = 1;
}

message FindRecordResponse {
  uint32 count = 1;

  message Record {
    Preamble preamble = 1;

    oneof data {
      ARecData a = 2;
      NsRecData ns = 3;
      CnameRecData cname = 4;
    }
  }

  repeated Record records = 2;
}

service DnsService {
  rpc UpsertDns(UpsertDnsRequest) returns (UpsertDnsResponse);
  rpc FindRecord(FindRecordRequest) returns (FindRecordResponse);
}
